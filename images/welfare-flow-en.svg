<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="Inter, -apple-system, sans-serif">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
  </style>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#B5B0AA"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#4A8E8E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="460" fill="none"/>

  <!-- USER INPUT -->
  <rect x="30" y="190" width="115" height="46" rx="6" fill="#2D6A6A" stroke="none" filter="url(#shadow)"/>
  <text x="87" y="218" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="600">User Input</text>

  <!-- Arrow → Intent Detection -->
  <line x1="145" y1="213" x2="180" y2="213" stroke="#B5B0AA" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- INTENT DETECTION (Diamond) -->
  <polygon points="250,173 320,213 250,253 180,213" fill="#F0F7F7" stroke="#2D6A6A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="250" y="209" text-anchor="middle" fill="#2D6A6A" font-size="11" font-weight="600">Intent</text>
  <text x="250" y="223" text-anchor="middle" fill="#2D6A6A" font-size="11" font-weight="600">Detection</text>

  <!-- Branch Labels -->
  <text x="285" y="160" text-anchor="middle" fill="#8A8A8A" font-size="10" font-weight="500">Matching Mode</text>
  <text x="285" y="290" text-anchor="middle" fill="#8A8A8A" font-size="10" font-weight="500">Detail Mode</text>

  <!-- MATCHING MODE BRANCH (Top) -->
  <path d="M320 188 L320 125 L380 125" stroke="#B5B0AA" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- User Info Extraction -->
  <rect x="390" y="100" width="130" height="50" rx="6" fill="#FFFFFF" stroke="#E8E5E1" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="455" y="121" text-anchor="middle" fill="#1A1A1A" font-size="11" font-weight="600">User Info</text>
  <text x="455" y="137" text-anchor="middle" fill="#1A1A1A" font-size="11" font-weight="600">Extraction</text>

  <!-- Arrow → Info Sufficient? -->
  <line x1="520" y1="125" x2="570" y2="125" stroke="#B5B0AA" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Info Sufficient? (Diamond) -->
  <polygon points="640,85 710,125 640,165 570,125" fill="#F0F7F7" stroke="#4A8E8E" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="640" y="121" text-anchor="middle" fill="#2D6A6A" font-size="10" font-weight="600">Info</text>
  <text x="640" y="135" text-anchor="middle" fill="#2D6A6A" font-size="10" font-weight="600">Sufficient?</text>

  <!-- NO branch → Request More Info -->
  <path d="M710 105 L750 105 L750 65 L820 65" stroke="#B5B0AA" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="728" y="97" fill="#8A8A8A" font-size="10">No</text>

  <rect x="830" y="40" width="130" height="50" rx="6" fill="#FFFFFF" stroke="#E8E5E1" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="895" y="61" text-anchor="middle" fill="#5A5A5A" font-size="11" font-weight="600">Request</text>
  <text x="895" y="77" text-anchor="middle" fill="#5A5A5A" font-size="11" font-weight="600">More Info</text>

  <!-- YES branch → Welfare Matching -->
  <path d="M710 145 L750 145 L750 185 L820 185" stroke="#B5B0AA" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="728" y="163" fill="#8A8A8A" font-size="10">Yes</text>

  <rect x="830" y="160" width="130" height="50" rx="6" fill="#F0F7F7" stroke="#2D6A6A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="895" y="181" text-anchor="middle" fill="#2D6A6A" font-size="11" font-weight="600">Welfare</text>
  <text x="895" y="197" text-anchor="middle" fill="#2D6A6A" font-size="11" font-weight="600">Program Matching</text>

  <!-- DETAIL MODE BRANCH (Bottom) -->
  <path d="M320 238 L320 315 L380 315" stroke="#B5B0AA" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Response Generation -->
  <rect x="390" y="290" width="130" height="50" rx="6" fill="#FFFFFF" stroke="#E8E5E1" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="455" y="311" text-anchor="middle" fill="#1A1A1A" font-size="11" font-weight="600">Response</text>
  <text x="455" y="327" text-anchor="middle" fill="#1A1A1A" font-size="11" font-weight="600">Generation</text>

  <!-- Arrow → Matching Mode? -->
  <line x1="520" y1="315" x2="570" y2="315" stroke="#B5B0AA" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Matching Mode? (Diamond) -->
  <polygon points="640,275 710,315 640,355 570,315" fill="#F0F7F7" stroke="#4A8E8E" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="640" y="311" text-anchor="middle" fill="#2D6A6A" font-size="10" font-weight="600">Matching</text>
  <text x="640" y="325" text-anchor="middle" fill="#2D6A6A" font-size="10" font-weight="600">Mode?</text>

  <!-- YES → Render Top 3 Welfare Cards -->
  <path d="M710 295 L750 295 L750 255 L820 255" stroke="#B5B0AA" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="728" y="287" fill="#8A8A8A" font-size="10">Yes</text>

  <rect x="830" y="230" width="130" height="50" rx="6" fill="#F0F7F7" stroke="#2D6A6A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="895" y="251" text-anchor="middle" fill="#2D6A6A" font-size="11" font-weight="600">Render Top 3</text>
  <text x="895" y="267" text-anchor="middle" fill="#2D6A6A" font-size="11" font-weight="600">Welfare Cards</text>

  <!-- NO → Display Response Only -->
  <path d="M710 335 L750 335 L750 375 L820 375" stroke="#B5B0AA" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="728" y="353" fill="#8A8A8A" font-size="10">No</text>

  <rect x="830" y="350" width="130" height="50" rx="6" fill="#FFFFFF" stroke="#E8E5E1" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="895" y="371" text-anchor="middle" fill="#5A5A5A" font-size="11" font-weight="600">Display</text>
  <text x="895" y="387" text-anchor="middle" fill="#5A5A5A" font-size="11" font-weight="600">Response Only</text>

  <!-- ==================== LOOP BACK — routed via right margin (x=975), clear of all boxes ==================== -->

  <!-- Main loop: Request More Info right edge → right spine → bottom → left spine → User Input -->
  <path d="M960,65 L975,65 L975,448 L15,448 L15,213 L30,213"
        stroke="#4A8E8E" stroke-width="1.2" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-teal)"/>

  <!-- Welfare Program Matching right edge → joins right spine -->
  <path d="M960,185 L975,185"
        stroke="#4A8E8E" stroke-width="1.2" stroke-dasharray="5,4" fill="none"/>

  <!-- Render Top 3 Welfare Cards right edge → joins right spine -->
  <path d="M960,255 L975,255"
        stroke="#4A8E8E" stroke-width="1.2" stroke-dasharray="5,4" fill="none"/>

  <!-- Display Response Only right edge → joins right spine -->
  <path d="M960,375 L975,375"
        stroke="#4A8E8E" stroke-width="1.2" stroke-dasharray="5,4" fill="none"/>

  <!-- Chat History Label — sits above the bottom loop path -->
  <rect x="400" y="420" width="180" height="24" rx="5" fill="#F0F7F7" stroke="#E8E5E1" stroke-width="1"/>
  <text x="490" y="437" text-anchor="middle" fill="#4A8E8E" font-size="11" font-weight="500">Update Chat History</text>

</svg>
