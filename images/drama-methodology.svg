<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 260" font-family="Inter, -apple-system, sans-serif">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
  </style>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7" fill="#B5B0AA"/>
    </marker>
  </defs>

  <rect width="850" height="260" fill="none"/>

  <!-- ==================== ROW 1 (left → right): ① → ② → ③ ==================== -->

  <!-- Step 1: Keyframe Extraction (accent — start) -->
  <rect x="20" y="20" width="230" height="80" rx="6" fill="#F0F7F7" stroke="#2D6A6A" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="48" cy="42" r="7.5" fill="#2D6A6A"/>
  <text x="48" y="46" text-anchor="middle" fill="#FFFFFF" font-size="8.5" font-weight="600">1</text>
  <text x="60" y="46" fill="#1F1F1F" font-size="11.5" font-weight="600">Keyframe Extraction</text>
  <text x="60" y="66" fill="#5A5A5A" font-size="10">Spanish original (S1, 11ep)</text>
  <text x="60" y="80" fill="#5A5A5A" font-size="10">Korean remake (Part 1, 6ep)</text>

  <!-- Arrow ① → ② -->
  <line x1="250" y1="60" x2="300" y2="60" stroke="#B5B0AA" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Image Clustering -->
  <rect x="300" y="20" width="230" height="80" rx="6" fill="#FFFFFF" stroke="#E8E5E1" stroke-width="1.2" filter="url(#shadow)"/>
  <circle cx="328" cy="42" r="7.5" fill="#2D6A6A"/>
  <text x="328" y="46" text-anchor="middle" fill="#FFFFFF" font-size="8.5" font-weight="600">2</text>
  <text x="340" y="46" fill="#1F1F1F" font-size="11.5" font-weight="600">Image Clustering</text>
  <text x="340" y="66" fill="#5A5A5A" font-size="10">ConvNeXtLarge (pretrained)</text>
  <text x="340" y="80" fill="#5A5A5A" font-size="10">5 storylines × 10 clusters</text>

  <!-- Arrow ② → ③ -->
  <line x1="530" y1="60" x2="580" y2="60" stroke="#B5B0AA" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Image Selection -->
  <rect x="580" y="20" width="230" height="80" rx="6" fill="#FFFFFF" stroke="#E8E5E1" stroke-width="1.2" filter="url(#shadow)"/>
  <circle cx="608" cy="42" r="7.5" fill="#2D6A6A"/>
  <text x="608" y="46" text-anchor="middle" fill="#FFFFFF" font-size="8.5" font-weight="600">3</text>
  <text x="620" y="46" fill="#1F1F1F" font-size="11.5" font-weight="600">Image Selection</text>
  <text x="620" y="66" fill="#5A5A5A" font-size="10">20 images: character +</text>
  <text x="620" y="80" fill="#5A5A5A" font-size="10">background per storyline</text>

  <!-- ==================== TURN: ③ ↓ ④ (elbow connector) ==================== -->
  <path d="M695,100 L695,130 L135,130 L135,160" stroke="#B5B0AA" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ==================== ROW 2 (left → right): ④ → ⑤ → ⑥ ==================== -->

  <!-- Step 4: Color Measurement -->
  <rect x="20" y="160" width="230" height="80" rx="6" fill="#FFFFFF" stroke="#E8E5E1" stroke-width="1.2" filter="url(#shadow)"/>
  <circle cx="48" cy="182" r="7.5" fill="#2D6A6A"/>
  <text x="48" y="186" text-anchor="middle" fill="#FFFFFF" font-size="8.5" font-weight="600">4</text>
  <text x="60" y="186" fill="#1F1F1F" font-size="11.5" font-weight="600">Color Measurement</text>
  <text x="60" y="206" fill="#5A5A5A" font-size="10">Dominant color extraction</text>
  <text x="60" y="220" fill="#5A5A5A" font-size="10">using CIELAB &amp; HSV</text>

  <!-- Arrow ④ → ⑤ -->
  <line x1="250" y1="200" x2="300" y2="200" stroke="#B5B0AA" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Color Cross-application (accent — key step) -->
  <rect x="300" y="160" width="230" height="80" rx="6" fill="#F0F7F7" stroke="#2D6A6A" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="328" cy="182" r="7.5" fill="#2D6A6A"/>
  <text x="328" y="186" text-anchor="middle" fill="#FFFFFF" font-size="8.5" font-weight="600">5</text>
  <text x="340" y="186" fill="#1F1F1F" font-size="11.5" font-weight="600">Color Cross-application</text>
  <text x="340" y="206" fill="#5A5A5A" font-size="10">Swap CIELAB L*a*b* values</text>
  <text x="340" y="220" fill="#5A5A5A" font-size="10">between KR &amp; SP versions</text>

  <!-- Arrow ⑤ → ⑥ -->
  <line x1="530" y1="200" x2="580" y2="200" stroke="#B5B0AA" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6: Survey & Analysis (accent — endpoint) -->
  <rect x="580" y="160" width="230" height="80" rx="6" fill="#F0F7F7" stroke="#2D6A6A" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="608" cy="182" r="7.5" fill="#2D6A6A"/>
  <text x="608" y="186" text-anchor="middle" fill="#FFFFFF" font-size="8.5" font-weight="600">6</text>
  <text x="620" y="186" fill="#1F1F1F" font-size="11.5" font-weight="600">Survey &amp; Analysis</text>
  <text x="620" y="206" fill="#5A5A5A" font-size="10">n=86 cross-cultural pairwise</text>
  <text x="620" y="220" fill="#5A5A5A" font-size="10">preference survey</text>

</svg>